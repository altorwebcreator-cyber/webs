<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Builder - Drag & Drop Editor</title>
    <link rel="stylesheet" href="builder-style.css">
</head>
<body>
    <div class="builder-container">
        <!-- Top Toolbar -->
        <header class="toolbar">
            <div class="toolbar-left">
                <a href="index.html" class="back-btn">← Back</a>
                <h2 id="projectName">My Website</h2>
            </div>
            <div class="toolbar-right">
                <button class="btn-icon" onclick="undoAction()" title="Undo">↶</button>
                <button class="btn-icon" onclick="redoAction()" title="Redo">↷</button>
                <button class="btn-save" onclick="saveWebsite()">💾 Save</button>
                <button class="btn-preview" onclick="previewWebsite()">👁️ Preview</button>
                <button class="btn-publish" onclick="publishWebsite()">🚀 Publish</button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="builder-main">
            <!-- Left Sidebar - Components -->
            <aside class="components-sidebar">
                <div class="sidebar-header">
                    <h3>Components</h3>
                </div>
                
                <div class="components-tabs">
                    <button class="tab-btn active" onclick="showTab('basic')">Basic</button>
                    <button class="tab-btn" onclick="showTab('layout')">Layout</button>
                    <button class="tab-btn" onclick="showTab('media')">Media</button>
                </div>

                <!-- Basic Components -->
                <div id="tab-basic" class="tab-content active">
                    <div class="component-item" draggable="true" data-type="heading">
                        <span class="icon">📝</span>
                        <span>Heading</span>
                    </div>
                    <div class="component-item" draggable="true" data-type="paragraph">
                        <span class="icon">📄</span>
                        <span>Paragraph</span>
                    </div>
                    <div class="component-item" draggable="true" data-type="button">
                        <span class="icon">🔘</span>
                        <span>Button</span>
                    </div>
                    <div class="component-item" draggable="true" data-type="link">
                        <span class="icon">🔗</span>
                        <span>Link</span>
                    </div>
                    <div class="component-item" draggable="true" data-type="list">
                        <span class="icon">📋</span>
                        <span>List</span>
                    </div>
                </div>

                <!-- Layout Components -->
                <div id="tab-layout" class="tab-content">
                    <div class="component-item" draggable="true" data-type="section">
                        <span class="icon">📦</span>
                        <span>Section</span>
                    </div>
                    <div class="component-item" draggable="true" data-type="container">
                        <span class="icon">🎁</span>
                        <span>Container</span>
                    </div>
                    <div class="component-item" draggable="true" data-type="navbar">
                        <span class="icon">🧭</span>
                        <span>Navbar</span>
                    </div>
                    <div class="component-item" draggable="true" data-type="footer">
                        <span class="icon">🔻</span>
                        <span>Footer</span>
                    </div>
                    <div class="component-item" draggable="true" data-type="columns">
                        <span class="icon">⬜</span>
                        <span>2 Columns</span>
                    </div>
                </div>

                <!-- Media Components -->
                <div id="tab-media" class="tab-content">
                    <div class="component-item" draggable="true" data-type="image">
                        <span class="icon">🖼️</span>
                        <span>Image</span>
                    </div>
                    <div class="component-item" draggable="true" data-type="video">
                        <span class="icon">🎥</span>
                        <span>Video</span>
                    </div>
                    <div class="component-item" draggable="true" data-type="icon">
                        <span class="icon">⭐</span>
                        <span>Icon</span>
                    </div>
                    <div class="component-item" draggable="true" data-type="form">
                        <span class="icon">📝</span>
                        <span>Form</span>
                    </div>
                </div>
            </aside>

            <!-- Canvas Area -->
            <main class="canvas-wrapper">
                <div class="canvas-toolbar">
                    <div class="device-buttons">
                        <button class="device-btn active" onclick="setDevice('desktop')">🖥️ Desktop</button>
                        <button class="device-btn" onclick="setDevice('tablet')">📱 Tablet</button>
                        <button class="device-btn" onclick="setDevice('mobile')">📱 Mobile</button>
                    </div>
                </div>
                
                <div id="canvas" class="canvas">
                    <div class="canvas-placeholder">
                        <div class="placeholder-content">
                            <h2>👋 Start Building!</h2>
                            <p>Drag components from the left sidebar to add them here</p>
                        </div>
                    </div>
                </div>
            </main>

            <!-- Right Sidebar - Properties -->
            <aside class="properties-sidebar">
                <div class="sidebar-header">
                    <h3>Properties</h3>
                </div>
                
                <div id="properties-panel" class="properties-panel">
                    <div class="no-selection">
                        <p>Select an element to edit its properties</p>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script src="builder-script.js"></script>
</body>
</html>
